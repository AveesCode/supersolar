<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super SOLAR 2026 - FIFA 2026 PREDICTION TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .locked { opacity: 0.5; grayscale: 100%; pointer-events: none; }
        .gold { color: #fbbf24; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-yellow-500 mb-4"></div>
        <p class="text-yellow-500 font-bold tracking-widest">LOADING SUPER SOLAR 2026...</p>
    </div>

    <div class="container mx-auto px-4 py-8">
        <!-- Header Section -->
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500">
                Super SOLAR 2026
            </h1>
            <p class="text-gray-400 font-bold uppercase tracking-[0.3em] text-sm mt-2">FIFA 2026 PREDICTION TRACKER</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: LEADERBOARD (Public) -->
            <div class="lg:col-span-4">
                <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 shadow-2xl sticky top-8">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2">
                        <span class="text-2xl">🏆</span> LEADERBOARD
                    </h2>
                    <div id="leaderboard-container" class="space-y-3">
                        <!-- Leaderboard items injected here -->
                        <p class="text-gray-500 italic text-sm">Calculating rankings...</p>
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-700 text-[10px] text-gray-500 uppercase tracking-widest text-center">
                        Points: 1 per correct pick
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: AUTH & MATCHES -->
            <div class="lg:col-span-8">
                
                <!-- Login Box (If not logged in) -->
                <div id="login-screen" class="bg-gray-800 p-8 rounded-2xl border border-blue-900 shadow-xl mb-10">
                    <h3 class="text-lg font-bold mb-4">Participant Login</h3>
                    <div class="flex flex-col md:flex-row gap-4">
                        <input type="password" id="login-code" placeholder="Enter Login Code" class="flex-1 p-4 rounded-lg bg-gray-900 border border-gray-700 outline-none focus:border-yellow-500 transition-all">
                        <button onclick="handleLogin()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-8 py-4 rounded-lg font-black transition-all">SIGN IN</button>
                    </div>
                </div>

                <!-- App Content (Hidden until login) -->
                <div id="app-content" class="hidden">
                    <div class="flex justify-between items-end mb-8 bg-gray-800 p-4 rounded-xl border border-gray-700">
                        <div>
                            <p class="text-xs text-gray-500 uppercase font-bold">Welcome Back</p>
                            <h2 id="user-welcome" class="text-2xl font-black text-yellow-500"></h2>
                        </div>
                        <button onclick="logout()" class="text-xs text-red-400 hover:underline">Sign Out</button>
                    </div>

                    <!-- Admin: Control Center -->
                    <div id="admin-panel" class="hidden space-y-6 mb-12">
                        <!-- Result Entry -->
                        <div class="bg-red-900/10 border border-red-500/30 p-6 rounded-2xl">
                            <h3 class="text-red-400 font-bold mb-4">🛠️ Set Match Result (Points Calculation)</h3>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <input type="number" id="res-match-id" placeholder="Match #" class="bg-gray-900 p-3 rounded border border-gray-700">
                                <select id="res-winner" class="bg-gray-900 p-3 rounded border border-gray-700">
                                    <option value="">Select Winner</option>
                                    <option value="A">Team A Wins</option>
                                    <option value="B">Team B Wins</option>
                                    <option value="Tie">Draw (Group Only)</option>
                                </select>
                                <button onclick="adminSetResult()" class="bg-red-600 hover:bg-red-500 rounded font-bold col-span-2">Update Result</button>
                            </div>
                        </div>

                        <!-- Match Update -->
                        <div class="bg-blue-900/10 border border-blue-500/30 p-6 rounded-2xl">
                            <h3 class="text-blue-400 font-bold mb-4">📝 Update Team Names</h3>
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                                <input type="number" id="adm-match-id" placeholder="Match #" class="bg-gray-900 p-3 rounded border border-gray-700">
                                <input type="text" id="adm-team-a" placeholder="Team A" class="bg-gray-900 p-3 rounded border border-gray-700 text-sm">
                                <input type="text" id="adm-team-b" placeholder="Team B" class="bg-gray-900 p-3 rounded border border-gray-700 text-sm">
                                <button onclick="adminUpdateTeams()" class="bg-blue-600 hover:bg-blue-500 rounded font-bold">Update</button>
                            </div>
                        </div>

                        <!-- User List (Codes) -->
                        <div class="bg-gray-800 border border-gray-600 p-6 rounded-2xl">
                            <h3 class="text-gray-300 font-bold mb-4">👥 Participant Codes & Access</h3>
                            <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-xs font-mono">
                                <!-- User codes injected here -->
                            </div>
                        </div>
                    </div>

                    <div id="match-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Matches injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION (COPY YOUR FIREBASE CONFIG HERE) ---
const firebaseConfig = {
  apiKey: "AIzaSyCmCTr3iMuL85IYam88BE3JIGJO4OVsscU",
  authDomain: "worldcup2026-7bd64.firebaseapp.com",
  databaseURL: "https://worldcup2026-7bd64-default-rtdb.firebaseio.com",
  projectId: "worldcup2026-7bd64",
  storageBucket: "worldcup2026-7bd64.firebasestorage.app",
  messagingSenderId: "138339199903",
  appId: "1:138339199903:web:db4d8b6295f65ae2062baa"
};

        const ADMIN_CODE = "ADMIN2026";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { matches: [], userData: {}, currentUser: null };

        // --- CORE FUNCTIONS ---

        async function loadData() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                state.matches = data.matches || [];
                state.userData = data.users || {};
                
                renderLeaderboard();
                if (state.currentUser) renderApp();
                document.getElementById('loader').classList.add('hidden');
            });
        }

        function calculateScores() {
            const rankings = [];
            // We iterate through all users found in the database
            Object.entries(state.userData).forEach(([code, data]) => {
                let score = 0;
                // If user data is just picks (from previous version), we handle it
                // We assume data is { picks: { "1": "A"... }, name: "..." }
                const picks = data.picks || data; 
                const name = data.name || code;

                state.matches.forEach(m => {
                    if (m && m.res && picks[m.id] === m.res) {
                        score++;
                    }
                });
                rankings.push({ name, score, code });
            });
            return rankings.sort((a, b) => b.score - a.score);
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-container');
            const rankings = calculateScores();

            container.innerHTML = rankings.map((player, index) => `
                <div class="flex items-center justify-between p-3 rounded-lg ${index === 0 ? 'bg-yellow-500/10 border border-yellow-500/20' : 'bg-gray-900/50'}">
                    <div class="flex items-center gap-3">
                        <span class="w-6 text-sm font-bold text-gray-500">#${index + 1}</span>
                        <span class="font-bold ${index === 0 ? 'text-yellow-500' : 'text-gray-200'}">${player.name}</span>
                    </div>
                    <span class="bg-gray-800 px-3 py-1 rounded-full text-xs font-black text-yellow-500">${player.score} PTS</span>
                </div>
            `).join('') || '<p class="text-gray-500 text-center py-4">No data yet</p>';
        }

        function handleLogin() {
            const code = document.getElementById('login-code').value.trim();
            if (code === ADMIN_CODE) {
                state.currentUser = { name: "Organizer", code: code, role: 'admin' };
            } else if (state.userData[code]) {
                state.currentUser = { ...state.userData[code], code: code, role: 'user' };
            } else {
                // Auto-create user if they have a code but aren't in DB yet (Team of 15 logic)
                if(code.length > 3) {
                    state.currentUser = { name: `Player ${code}`, code: code, role: 'user' };
                    db.ref(`users/${code}/name`).set(state.currentUser.name);
                } else {
                    alert("Invalid Login Code"); return;
                }
            }
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            renderApp();
        }

        function renderApp() {
            const user = state.currentUser;
            document.getElementById('user-welcome').innerText = user.name;
            
            if (user.role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdminUserList();
            }

            const container = document.getElementById('match-list');
            const now = new Date();
            const userPicks = (state.userData[user.code]?.picks) || (state.userData[user.code]) || {};

            container.innerHTML = state.matches.slice(1).map(m => {
                const kickoff = new Date(m.t);
                const isLocked = now > kickoff;
                const pick = userPicks[m.id];
                const result = m.res; // Actual winner
                
                return `
                    <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 shadow-lg ${isLocked ? 'opacity-60' : ''}">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold bg-gray-900 px-2 py-1 rounded text-gray-500 uppercase">Match #${m.id}</span>
                            <span class="text-[10px] text-yellow-600 font-bold uppercase">${kickoff.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})} ET</span>
                        </div>
                        
                        <div class="text-[10px] text-gray-500 mb-4 uppercase tracking-widest">${m.v} • ${m.c}</div>

                        <div class="flex flex-col gap-2">
                            <button onclick="submitPick(${m.id}, 'A')" ${isLocked ? 'disabled' : ''} class="w-full text-left p-3 rounded-lg border ${pick === 'A' ? 'bg-yellow-600 border-yellow-400' : 'bg-gray-900 border-gray-700 hover:border-gray-500'} transition-all flex justify-between items-center">
                                <span class="font-bold text-sm uppercase">${m.a}</span>
                                ${result === 'A' ? '⭐' : (pick === 'A' ? '✔️' : '')}
                            </button>
                            
                            ${m.type === 'Group' ? `
                                <button onclick="submitPick(${m.id}, 'Tie')" ${isLocked ? 'disabled' : ''} class="w-full text-center p-1 text-[10px] rounded-lg border ${pick === 'Tie' ? 'bg-gray-600 border-gray-400' : 'bg-gray-900/50 border-gray-800 hover:border-gray-600'}">
                                    DRAW ${result === 'Tie' ? '⭐' : ''}
                                </button>
                            ` : ''}

                            <button onclick="submitPick(${m.id}, 'B')" ${isLocked ? 'disabled' : ''} class="w-full text-left p-3 rounded-lg border ${pick === 'B' ? 'bg-yellow-600 border-yellow-400' : 'bg-gray-900 border-gray-700 hover:border-gray-500'} transition-all flex justify-between items-center">
                                <span class="font-bold text-sm uppercase">${m.b}</span>
                                ${result === 'B' ? '⭐' : (pick === 'B' ? '✔️' : '')}
                            </button>
                        </div>
                        
                        ${isLocked ? `<div class="text-center mt-3 text-[10px] font-black ${result ? 'text-green-500' : 'text-red-500'} uppercase tracking-widest">${result ? 'Finalized' : 'In Progress / Locked'}</div>` : ''}
                    </div>
                `;
            }).join('');
        }

        async function submitPick(matchId, pick) {
            if (state.currentUser.role === 'admin') return;
            await db.ref(`users/${state.currentUser.code}/picks/${matchId}`).set(pick);
        }

        function renderAdminUserList() {
            const container = document.getElementById('admin-user-list');
            container.innerHTML = Object.entries(state.userData).map(([code, data]) => `
                <div class="p-2 bg-gray-900 rounded border border-gray-700 flex justify-between">
                    <span class="text-gray-400">${data.name || 'Anonymous'}</span>
                    <span class="text-yellow-500 font-bold">${code}</span>
                </div>
            `).join('');
        }

        // --- ADMIN ACTIONS ---
        async function adminSetResult() {
            const id = document.getElementById('res-match-id').value;
            const res = document.getElementById('res-winner').value;
            if(!id || !res) return alert("Select Match and Result");
            await db.ref(`matches/${id}/res`).set(res);
            alert(`Match ${id} Result Saved!`);
        }

        async function adminUpdateTeams() {
            const id = document.getElementById('adm-match-id').value;
            const a = document.getElementById('adm-team-a').value;
            const b = document.getElementById('adm-team-b').value;
            if(!id || !a || !b) return alert("Fill all fields");
            await db.ref(`matches/${id}`).update({ a: a, b: b });
            alert("Teams Updated");
        }

        function logout() {
            state.currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
        }

        loadData();
    </script>
</body>
</html>
