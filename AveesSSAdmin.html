<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - SUPER SOLAR 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div id="login-overlay" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-xl w-full max-w-md">
            <h1 class="text-2xl font-black text-yellow-500 mb-6 text-center">ADMIN ACCESS</h1>
            <input type="password" id="admin-pass" placeholder="Admin Key" class="w-full p-4 rounded-xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-500 mb-4">
            <button onclick="checkAdminAuth()" class="w-full bg-yellow-500 text-black py-4 rounded-xl font-black">UNLOCK TERMINAL</button>
        </div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-5xl">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-yellow-500">SYSTEM ADMIN</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Super Solar 2026 Management</p>
            </div>
            <a href="index.html" class="text-xs font-bold bg-slate-800 px-4 py-2 rounded-lg hover:bg-slate-700">EXIT TO PUBLIC SITE</a>
        </header>

        <div class="grid grid-cols-1 gap-8">
            <!-- 1. USER MANAGEMENT -->
            <section class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl">
                <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest mb-6">Participant Management</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                    <input type="text" id="new-first" placeholder="First Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="text" id="new-last" placeholder="Last Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="text" id="new-code" placeholder="Login Code" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm uppercase">
                    <button onclick="adminAddUser()" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-bold text-xs uppercase">Add Participant</button>
                </div>
                <div id="admin-user-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    <!-- Users injected here -->
                </div>
            </section>

            <!-- 2. MATCH UPDATER -->
            <section class="bg-slate-900 border border-blue-500/30 p-6 rounded-2xl shadow-xl">
                <h3 class="text-blue-400 font-black text-xs uppercase tracking-widest mb-6">Update Match Details (TBD Slots)</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                    <input type="number" id="adm-match-id" placeholder="Match #" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="text" id="adm-team-a" placeholder="Team A Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="text" id="adm-team-b" placeholder="Team B Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="text" id="adm-venue" placeholder="Stadium Venue" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <input type="text" id="adm-city" placeholder="City" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <input type="datetime-local" id="adm-time" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm text-slate-400">
                    <select id="adm-type" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                        <option value="Group">Group Stage</option>
                        <option value="Playoff">Playoff/Knockout</option>
                    </select>
                    <button onclick="adminUpdateMatchData()" class="bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-xs uppercase">Save Match Info</button>
                </div>
            </section>

            <!-- 3. RESULT SETTER -->
            <section class="bg-slate-900 border border-red-900/40 p-6 rounded-2xl shadow-xl">
                <h3 class="text-red-500 font-black text-xs uppercase tracking-widest mb-6">Settle Official Results</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="number" id="res-match-id" placeholder="Match #" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                    <select id="res-winner" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                        <option value="">Select Winner...</option>
                        <option value="A">Team A (Top)</option>
                        <option value="B">Team B (Bottom)</option>
                        <option value="Tie">Draw (Groups Only)</option>
                    </select>
                    <button onclick="adminSetResult()" class="bg-red-600 hover:bg-red-500 rounded-lg font-bold text-xs uppercase">Submit & Sync Ranks</button>
                </div>
            </section>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmCTr3iMuL85IYam88BE3JIGJO4OVsscU",
            authDomain: "worldcup2026-7bd64.firebaseapp.com",
            databaseURL: "https://worldcup2026-7bd64-default-rtdb.firebaseio.com",
            projectId: "worldcup2026-7bd64",
            storageBucket: "worldcup2026-7bd64.firebasestorage.app",
            messagingSenderId: "138339199903",
            appId: "1:138339199903:web:db4d8b6295f65ae2062baa"
        };

        const ADMIN_HASH = "d43d008e1e431c20bf6acaa2ba6aa575e83da51eb43b1cd0eea2387e04ead39a";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let state = { users: {}, matches: [] };

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);                    
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function checkAdminAuth() {
            const pass = document.getElementById('admin-pass').value;
            const hashed = await sha256(pass);
            if(hashed === ADMIN_HASH) {
                document.getElementById('login-overlay').classList.add('hidden');
                init();
            } else {
                alert("Access Denied");
            }
        }

        function init() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                state.users = data.users || {};
                state.matches = data.matches || [];
                renderAdminUsers();
            });
        }

        function renderAdminUsers() {
            const list = document.getElementById('admin-user-list');
            list.innerHTML = Object.entries(state.users).map(([id, u]) => `
                <div class="flex justify-between items-center p-3 bg-slate-950 rounded-xl border border-slate-800">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold">${u.firstName} ${u.lastName}</span>
                        <span class="text-[10px] text-slate-500 font-mono">${u.code}</span>
                    </div>
                    <button onclick="adminDeleteUser('${id}')" class="text-red-900 hover:text-red-500 px-2 transition-colors">✕</button>
                </div>
            `).join('');
        }

        async function adminAddUser() {
            const first = document.getElementById('new-first').value;
            const last = document.getElementById('new-last').value;
            const code = document.getElementById('new-code').value.toUpperCase();
            if(!first || !code) return alert("Missing Info");
            await db.ref('users').push({ firstName: first, lastName: last, code: code, picks: {}, prevRank: 0 });
            document.getElementById('new-first').value = '';
            document.getElementById('new-last').value = '';
            document.getElementById('new-code').value = '';
        }

        async function adminDeleteUser(id) {
            if(confirm("Permanently delete this participant?")) await db.ref(`users/${id}`).remove();
        }

        async function adminUpdateMatchData() {
            const id = document.getElementById('adm-match-id').value;
            if(!id) return alert("Enter Match #");
            
            const update = {};
            const fields = { a: 'adm-team-a', b: 'adm-team-b', v: 'adm-venue', c: 'adm-city', t: 'adm-time', type: 'adm-type' };
            
            Object.keys(fields).forEach(key => {
                const val = document.getElementById(fields[key]).value;
                if(val) update[key] = val;
            });

            await db.ref(`matches/${id}`).update(update);
            alert("Match Updated");
        }

        async function adminSetResult() {
            const id = document.getElementById('res-match-id').value;
            const res = document.getElementById('res-winner').value;
            if(!id || !res) return alert("Select Match and Winner");

            const currentRankings = Object.entries(state.users).map(([uid, user]) => {
                let score = 0;
                const picks = user.picks || {};
                state.matches.forEach(m => { if (m && m.res && picks[m.id] === m.res) score++; });
                return { uid, score };
            }).sort((a, b) => b.score - a.score);

            const rankUpdates = {};
            currentRankings.forEach((item, index) => {
                rankUpdates[`users/${item.uid}/prevRank`] = index + 1;
            });

            await db.ref().update(rankUpdates);
            await db.ref(`matches/${id}/res`).set(res);
            alert("Result Saved & Ranks Snapshotted");
        }
    </script>
</body>
</html>
