<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super SOLAR 2026 - FIFA 2026 PREDICTION TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .locked { opacity: 0.6; grayscale: 100%; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #eab308; color: #eab308; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div id="loader" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-yellow-500 mb-4"></div>
        <p class="text-yellow-500 font-bold text-xs tracking-widest uppercase">Syncing Super SOLAR 2026...</p>
    </div>

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500">
                SUPER SOLAR
            </h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[12px] mt-2">FIFA WORLD CUP 2026 PREDICTION TRACKER</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT COLUMN: STANDINGS -->
            <div class="lg:col-span-4">
                <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl sticky top-8">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2">
                        <span class="text-2xl text-yellow-500">🏆</span> STANDINGS
                    </h2>
                    <div id="leaderboard-container" class="space-y-2"></div>
                </div>
            </div>

            <!-- RIGHT COLUMN: MAIN CONTENT -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- LOGIN SCREEN -->
                <div id="login-screen" class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-xl">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4 text-center">Participant Access</h3>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="password" id="login-code" placeholder="Enter Login Code" class="flex-1 p-4 rounded-xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-500 transition-all text-center tracking-widest font-bold">
                        <button onclick="handleLogin()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-10 py-4 rounded-xl font-black transition-all shadow-lg">ENTER</button>
                    </div>
                </div>

                <!-- PUBLIC PREDICTION DASHBOARD -->
                <div id="public-dashboard" class="hidden space-y-4 mb-8">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-yellow-500"></span>
                        </span>
                        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Upcoming Match Hype</h3>
                    </div>
                    <div id="hype-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <!-- Hype cards injected here -->
                    </div>
                </div>

                <!-- MAIN APP CONTENT -->
                <div id="app-content" class="hidden space-y-6">
                    
                    <!-- USER HEADER & STATS -->
                    <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 space-y-4">
                        <div class="flex justify-between items-center">
                            <div>
                                <h2 id="user-welcome" class="text-2xl font-black text-yellow-500"></h2>
                                <p id="user-role-tag" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest"></p>
                            </div>
                            <button onclick="logout()" class="px-4 py-2 bg-slate-800 hover:bg-red-900/40 text-slate-400 hover:text-red-400 text-[10px] font-bold rounded-lg transition-all uppercase">Logout</button>
                        </div>
                        
                        <!-- STATS STRIP -->
                        <div class="grid grid-cols-3 gap-2 pt-4 border-t border-slate-800/50 text-center">
                            <div>
                                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Total Predicted</p>
                                <p id="stat-picks" class="text-lg font-black text-white">0</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Correct</p>
                                <p id="stat-correct" class="text-lg font-black text-green-500">0</p>
                            </div>
                            <div>
                                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Accuracy</p>
                                <p id="stat-accuracy" class="text-lg font-black text-blue-400">0%</p>
                            </div>
                        </div>
                    </div>

                    <!-- NEXT MATCH COUNTDOWN -->
                    <div id="countdown-bar" class="bg-gradient-to-r from-blue-900/20 to-slate-900 border border-blue-500/20 p-4 rounded-2xl flex justify-between items-center hidden">
                        <div class="flex items-center gap-3">
                            <span class="animate-pulse w-2 h-2 rounded-full bg-blue-500"></span>
                            <span class="text-[10px] font-black uppercase tracking-widest text-blue-400">Next Kickoff:</span>
                            <span id="next-match-name" class="text-[10px] font-bold text-slate-300 uppercase"></span>
                        </div>
                        <div id="countdown-timer" class="text-sm font-black text-white font-mono">--:--:--</div>
                    </div>

                    <!-- SEARCH & FILTERS -->
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
                        <div class="p-2 border-b border-slate-800">
                            <input type="text" id="match-search" oninput="renderApp()" placeholder="Search teams..." class="w-full bg-slate-950 p-3 rounded-xl text-sm border-none outline-none focus:ring-1 ring-yellow-500/50 transition-all">
                        </div>
                        <div class="flex overflow-x-auto">
                            <button onclick="setFilter('all')" id="tab-all" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all border-b-2 border-transparent">All</button>
                            <button onclick="setFilter('picks')" id="tab-picks" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all border-b-2 border-transparent">My Picks</button>
                            <button onclick="setFilter('upcoming')" id="tab-upcoming" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all border-b-2 border-transparent">Upcoming</button>
                            <button onclick="setFilter('results')" id="tab-results" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all border-b-2 border-transparent">Results</button>
                        </div>
                    </div>

                    <!-- MATCH GRID -->
                    <div id="match-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCmCTr3iMuL85IYam88BE3JIGJO4OVsscU",
            authDomain: "worldcup2026-7bd64.firebaseapp.com",
            databaseURL: "https://worldcup2026-7bd64-default-rtdb.firebaseio.com",
            projectId: "worldcup2026-7bd64",
            storageBucket: "worldcup2026-7bd64.firebasestorage.app",
            messagingSenderId: "138339199903",
            appId: "1:138339199903:web:db4d8b6295f65ae2062baa"
        };
       
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { 
            matches: [], 
            userData: {}, 
            currentUser: null, 
            filter: 'all',
            nextMatchInterval: null 
        };

        async function init() {
            db.ref('/').on('value', async (snapshot) => {
                const data = snapshot.val() || {};
                state.matches = data.matches || [];
                state.userData = data.users || {};
                
                renderStandings();
                renderPublicDashboard();
                if (state.currentUser) {
                    // Update current user local state from DB
                    state.currentUser = { ...state.userData[state.currentUser.id], id: state.currentUser.id };
                    renderApp();
                }
                document.getElementById('loader').classList.add('hidden');
            });
            
            // Start Countdown Refresh
            setInterval(updateCountdown, 1000);
        }

        async function handleLogin() {
            const inputCode = document.getElementById('login-code').value.trim();
            const userEntry = Object.entries(state.userData).find(([id, u]) => u.code === inputCode.toUpperCase());
            if (userEntry) {
                state.currentUser = { ...userEntry[1], id: userEntry[0], role: 'user' };
                showApp();
            } else {
                alert("Unauthorized Login Code");
            }
        }
        
        function showApp() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            renderApp();
        }

        function setFilter(f) {
            state.filter = f;
            renderApp();
        }

        function updateCountdown() {
            if (!state.matches.length) return;
            const now = new Date();
            const nextMatch = state.matches.slice(1).find(m => m && new Date(m.t) > now);
            
            const bar = document.getElementById('countdown-bar');
            if (!nextMatch || !state.currentUser) {
                bar.classList.add('hidden');
                return;
            }

            bar.classList.remove('hidden');
            document.getElementById('next-match-name').innerText = `${nextMatch.a} vs ${nextMatch.b}`;
            
            const diff = new Date(nextMatch.t) - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown-timer').innerText = 
                `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function renderApp() {
            const user = state.currentUser;
            const picks = user.picks || {};
            const search = document.getElementById('match-search').value.toLowerCase();
            const now = new Date();

            document.getElementById('user-welcome').innerText = `${user.firstName} ${user.lastName}`;
            
            
            // --- STATS CALCULATION ---
            const settledMatches = state.matches.filter(m => m && m.res);
            let correct = 0;
            let attempted = 0;
            let missed = 0;
            settledMatches.forEach(m => {
                if (picks[m.id]) {
                    attempted++;
                    if (picks[m.id] === m.res) correct++;
                } else {
                    missed++;
                }
            });
            const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;
            
            document.getElementById('stat-picks').innerText = `${attempted}/${settledMatches.length}`;
            document.getElementById('stat-correct').innerText = correct;
            document.getElementById('stat-accuracy').innerHTML = `<span class="text-blue-400">${accuracy}%</span> <span class="text-[10px] text-red-500 ml-1">(${missed} Miss)</span>`;

            // --- NAVIGATION TAB UI REFRESH ---
            ['all', 'picks', 'upcoming', 'results'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (state.filter === t) {
                    // Active Tab Style
                    btn.className = "flex-1 py-4 text-[10px] font-black uppercase tracking-[0.2em] transition-all border-b-4 border-yellow-500 text-yellow-500 bg-yellow-500/5";
                } else {
                    // Inactive Tab Style
                    btn.className = "flex-1 py-4 text-[10px] font-bold uppercase tracking-[0.1em] transition-all border-b-4 border-transparent text-slate-500 hover:text-slate-300 hover:bg-slate-800/50";
                }
            });

            // --- FILTERING & RENDERING ---
            let filtered = state.matches.slice(1).filter(m => m !== null);
            if (search) filtered = filtered.filter(m => m.a.toLowerCase().includes(search) || m.b.toLowerCase().includes(search));
            if (state.filter === 'picks') filtered = filtered.filter(m => picks[m.id]);
            if (state.filter === 'upcoming') filtered = filtered.filter(m => new Date(m.t) > now);
            if (state.filter === 'results') filtered = filtered.filter(m => m.res);

            const container = document.getElementById('match-list');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full p-20 text-center text-slate-600 italic text-sm">No matches match your filter...</div>`;
                return;
            }

            container.innerHTML = filtered.map(m => {
                const kickoff = new Date(m.t);
                const isLocked = now > kickoff;
                const userPick = picks[m.id];
                const kickoffStr = kickoff.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

                return `
                    <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden shadow-lg ${isLocked ? 'locked' : ''}">
                        <div class="p-4 bg-slate-950/50 border-b border-slate-800 flex justify-between items-center">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Match #${m.id}</span>
                            <span class="text-[9px] font-bold text-yellow-600 uppercase tracking-tighter">${kickoffStr} ET</span>
                        </div>
                        <div class="p-5 space-y-4">
                            <div class="flex flex-col gap-2">
                                <button onclick="savePick(${m.id}, 'A')" class="flex justify-between items-center p-4 rounded-xl border text-sm font-black transition-all ${userPick === 'A' ? 'bg-yellow-500 border-yellow-400 text-black shadow-lg scale-[1.02]' : 'bg-slate-950 border-slate-800 hover:border-slate-600'}">
                                    <span>${m.a}</span>
                                    ${m.res === 'A' ? '<span class="text-lg">⭐</span>' : (userPick === 'A' ? '<span>✓</span>' : '')}
                                </button>
                                ${m.type === 'Group' ? `
                                    <button onclick="savePick(${m.id}, 'Tie')" class="py-1 rounded-lg border text-[9px] font-black tracking-widest transition-all ${userPick === 'Tie' ? 'bg-slate-700 border-slate-500 text-white' : 'bg-slate-950 border-slate-900 text-slate-600'}">
                                        DRAW ${m.res === 'Tie' ? '⭐' : ''}
                                    </button>
                                ` : ''}
                                <button onclick="savePick(${m.id}, 'B')" class="flex justify-between items-center p-4 rounded-xl border text-sm font-black transition-all ${userPick === 'B' ? 'bg-yellow-500 border-yellow-400 text-black shadow-lg scale-[1.02]' : 'bg-slate-950 border-slate-800 hover:border-slate-600'}">
                                    <span>${m.b}</span>
                                    ${m.res === 'B' ? '<span class="text-lg">⭐</span>' : (userPick === 'B' ? '<span>✓</span>' : '')}
                                </button>
                            </div>
                            <div class="pt-2 border-t border-slate-800/50">
                                <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest truncate">${m.v}</p>
                                <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">${m.c}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            renderPublicDashboard();
        }

        async function savePick(matchId, pick) {
            await db.ref(`users/${state.currentUser.id}/picks/${matchId}`).set(pick);
        }

        function renderStandings() {
            const container = document.getElementById('leaderboard-container');
            
            const rankings = Object.entries(state.userData).map(([id, user]) => {
                let correct = 0, attempted = 0, missed = 0, incorrect = 0;
                const picks = user.picks || {};
                
                // Only evaluate matches that the admin has settled
                const settledMatches = state.matches.filter(m => m && m.res);
                const totalSettled = settledMatches.length;

                settledMatches.forEach(m => {
                    if (picks[m.id]) {
                        attempted++;
                        if (picks[m.id] === m.res) correct++;
                        else incorrect++; // Match exists, pick exists, but they don't match
                    } else {
                        missed++; // Match exists, but no pick was found
                    }
                });

                const accuracy = attempted > 0 ? Math.round((correct / attempted) * 100) : 0;

                return { 
                    name: `${user.firstName} ${user.lastName}`, 
                    score: correct, 
                    attempted, totalSettled, missed, incorrect, accuracy,
                    prevRank: user.prevRank || 0 
                };
            }).sort((a, b) => b.score - a.score || b.accuracy - a.accuracy);

            container.innerHTML = rankings.map((p, i) => {
                const currentRank = i + 1;
                
                // Podium Styling
                let medal = "";
                let rankBorder = "border-slate-800";
                if (currentRank === 1) { medal = "🥇"; rankBorder = "border-yellow-500/50"; }
                else if (currentRank === 2) { medal = "🥈"; rankBorder = "border-slate-400/50"; }
                else if (currentRank === 3) { medal = "🥉"; rankBorder = "border-orange-500/50"; }

                let move = '<span class="text-slate-800">-</span>';
                if (p.prevRank !== 0) {
                    if (currentRank < p.prevRank) move = '<span class="text-green-500 text-[10px]">▲</span>';
                    else if (currentRank > p.prevRank) move = '<span class="text-red-500 text-[10px]">▼</span>';
                }

                return `
                    <div class="flex flex-col p-3 rounded-2xl bg-slate-900/40 border ${rankBorder} mb-2">
                        <!-- TOP LINE: Rank, Name, Score -->
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <span class="w-3 text-center">${move}</span>
                                <span class="text-[12px] font-black text-slate-500 w-4">${medal || currentRank + '.'}</span>
                                <span class="text-sm font-bold text-slate-100">${p.name}</span>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-black text-yellow-500">${p.score} <span class="text-[8px] text-slate-500 tracking-widest uppercase">PTS</span></span>
                            </div>
                        </div>
                        
                        <!-- BOTTOM LINE: Simplified Stats Table -->
                        <div class="grid grid-cols-3 gap-1 bg-slate-950/80 rounded-xl p-2 ml-6 border border-slate-800/50 text-center">
                            <div class="border-r border-slate-800">
                                <p class="text-[11px] text-slate-500 uppercase font-black tracking-tighter">Predicted</p>
                                <p class="text-[12px] font-mono font-bold text-slate-300">${p.attempted}/${p.totalSettled}</p>
                            </div>
                            <div class="border-r border-slate-800">
                                <p class="text-[11px] text-slate-500 uppercase font-black tracking-tighter">Incorrect</p>
                                <p class="text-[12px] font-mono font-bold text-orange-600">${p.incorrect}</p>
                            </div>
                            <div>
                                <p class="text-[11px] text-slate-500 uppercase font-black tracking-tighter">Missed</p>
                                <p class="text-[12px] font-mono font-bold text-red-600">${p.missed}</p>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderPublicDashboard() {
            const container = document.getElementById('public-dashboard');
            const grid = document.getElementById('hype-grid');
            const now = new Date();
            
            // 1. Get total participants
            const totalUsers = Object.keys(state.userData).length;
            if (totalUsers === 0) return;

            // 2. Find next 3 matches
            const upcoming = state.matches
                .slice(1)
                .filter(m => m && new Date(m.t) > now)
                .sort((a, b) => new Date(a.t) - new Date(b.t))
                .slice(0, 3);

            if (upcoming.length === 0) {
                container.classList.add('hidden');
                return;
            }

            container.classList.remove('hidden');

            grid.innerHTML = upcoming.map(m => {
                // 3. Count how many users have a pick for this specific match ID
                let pickCount = 0;
                Object.values(state.userData).forEach(user => {
                    if (user.picks && user.picks[m.id]) pickCount++;
                });

                const percent = Math.round((pickCount / totalUsers) * 100);
                const kickoff = new Date(m.t).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-lg relative overflow-hidden">
                        <!-- Background Glow -->
                        <div class="absolute -right-4 -top-4 w-16 h-16 bg-yellow-500/5 blur-3xl rounded-full"></div>
                        
                        <div class="relative z-10">
                            <p class="text-[8px] font-black text-yellow-600 uppercase mb-1">${kickoff}</p>
                            <div class="text-[11px] font-bold text-slate-200 mb-3 truncate">
                                ${m.a} <span class="text-slate-600 mx-1">vs</span> ${m.b}
                            </div>
                            
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">Participation</span>
                                <span class="text-[10px] font-mono font-bold text-yellow-500">${pickCount}/${totalUsers}</span>
                            </div>
                            
                            <!-- Progress Bar -->
                            <div class="w-full bg-slate-950 h-1 rounded-full overflow-hidden border border-slate-800">
                                <div class="bg-gradient-to-r from-yellow-600 to-yellow-400 h-full transition-all duration-1000" style="width: ${percent}%"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() { location.reload(); }
        init();
    </script>
</body>
</html>
