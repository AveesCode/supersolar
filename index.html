<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super SOLAR 2026 - FIFA 2026 PREDICTION TRACKER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .locked { opacity: 0.6; grayscale: 100%; pointer-events: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <div id="loader" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-yellow-500 mb-4"></div>
        <p class="text-yellow-500 font-bold text-xs tracking-widest uppercase">Initializing Tracker...</p>
    </div>

    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500">
                Super SOLAR 2026
            </h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.4em] text-[10px] mt-2">FIFA 2026 PREDICTION TRACKER</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- LEFT: PUBLIC STANDINGS -->
            <div class="lg:col-span-4">
                <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl sticky top-8">
                    <h2 class="text-xl font-black mb-6 flex items-center gap-2">
                        <span class="text-2xl text-yellow-500">🏆</span> STANDINGS
                    </h2>
                    <div id="leaderboard-container" class="space-y-2">
                        <!-- Rankings injected here -->
                    </div>
                </div>
            </div>

            <!-- RIGHT: MAIN APP -->
            <div class="lg:col-span-8 space-y-6">
                
                <!-- LOGIN -->
                <div id="login-screen" class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-xl">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4 text-center">Participant Access</h3>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="password" id="login-code" placeholder="Enter Login Code" class="flex-1 p-4 rounded-xl bg-slate-950 border border-slate-800 outline-none focus:border-yellow-500 transition-all text-center sm:text-left">
                        <button onclick="handleLogin()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-10 py-4 rounded-xl font-black transition-all shadow-lg">ENTER</button>
                    </div>
                </div>

                <!-- APP CONTENT -->
                <div id="app-content" class="hidden space-y-6">
                    <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800">
                        <div>
                            <h2 id="user-welcome" class="text-2xl font-black text-yellow-500"></h2>
                            <p id="user-role-tag" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest"></p>
                        </div>
                        <button onclick="logout()" class="px-4 py-2 bg-slate-800 hover:bg-red-900/40 text-slate-400 hover:text-red-400 text-[10px] font-bold rounded-lg transition-all uppercase">Logout</button>
                    </div>

                    <!-- ADMIN PANEL -->
                    <div id="admin-panel" class="hidden space-y-4">
                        
                        <!-- ADD PARTICIPANT -->
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                            <h3 class="text-yellow-500 font-black text-xs uppercase tracking-widest mb-4">Add New Participant</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-4 gap-2">
                                <input type="text" id="new-first" placeholder="First Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm outline-none focus:border-blue-500">
                                <input type="text" id="new-last" placeholder="Last Name" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm outline-none focus:border-blue-500">
                                <input type="text" id="new-code" placeholder="Login Code" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm outline-none focus:border-blue-500 uppercase">
                                <button onclick="adminAddUser()" class="bg-blue-600 hover:bg-blue-500 rounded-lg font-bold text-xs uppercase">Register</button>
                            </div>
                        </div>

                        <!-- ROSTER MANAGEMENT -->
                        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl">
                            <h3 class="text-slate-400 font-black text-xs uppercase tracking-widest mb-4">Participant Roster (Admin Only)</h3>
                            <div id="admin-user-list" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                <!-- Users injected here -->
                            </div>
                        </div>

                        <!-- MATCH RESULTS -->
                        <div class="bg-red-950/20 border border-red-900/40 p-6 rounded-2xl">
                            <h3 class="text-red-500 font-black text-xs uppercase tracking-widest mb-4">Set Official Results</h3>
                            <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                <input type="number" id="res-match-id" placeholder="Match #" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                                <select id="res-winner" class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-sm">
                                    <option value="">Winner?</option>
                                    <option value="A">Team A</option>
                                    <option value="B">Team B</option>
                                    <option value="Tie">Draw</option>
                                </select>
                                <button onclick="adminSetResult()" class="bg-red-600 hover:bg-red-500 rounded-lg font-bold text-xs uppercase">Submit</button>
                            </div>
                        </div>
                    </div>

                    <div id="match-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <!-- Matches injected here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION (PASTE YOUR CONFIG HERE) ---
const firebaseConfig = {
  apiKey: "AIzaSyCmCTr3iMuL85IYam88BE3JIGJO4OVsscU",
  authDomain: "worldcup2026-7bd64.firebaseapp.com",
  databaseURL: "https://worldcup2026-7bd64-default-rtdb.firebaseio.com",
  projectId: "worldcup2026-7bd64",
  storageBucket: "worldcup2026-7bd64.firebasestorage.app",
  messagingSenderId: "138339199903",
  appId: "1:138339199903:web:db4d8b6295f65ae2062baa"
};

        const ADMIN_CODE = "ADMIN2026";
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { matches: [], userData: {}, currentUser: null };

        async function init() {
            db.ref('/').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                state.matches = data.matches || [];
                state.userData = data.users || {};
                renderStandings();
                if (state.currentUser) renderApp();
                document.getElementById('loader').classList.add('hidden');
            });
        }

        function calculateScores() {
            return Object.entries(state.userData).map(([id, user]) => {
                let score = 0;
                const picks = user.picks || {};
                state.matches.forEach(m => {
                    if (m && m.res && picks[m.id] === m.res) score++;
                });
                return { name: `${user.firstName} ${user.lastName}`, score, id };
            }).sort((a, b) => b.score - a.score);
        }

        function renderStandings() {
            const container = document.getElementById('leaderboard-container');
            const rankings = calculateScores();
            container.innerHTML = rankings.map((p, idx) => `
                <div class="flex items-center justify-between p-3 rounded-xl bg-slate-950 border border-slate-800">
                    <div class="flex items-center gap-3">
                        <span class="text-[10px] font-bold text-slate-600 w-4">${idx+1}</span>
                        <span class="font-bold text-sm ${idx === 0 ? 'text-yellow-500' : 'text-slate-300'}">${p.name}</span>
                    </div>
                    <span class="text-xs font-black bg-slate-900 px-3 py-1 rounded-lg border border-slate-800">${p.score} PTS</span>
                </div>
            `).join('');
        }

        function handleLogin() {
            const code = document.getElementById('login-code').value.trim().toUpperCase();
            if (code === ADMIN_CODE) {
                state.currentUser = { firstName: "System", lastName: "Admin", role: 'admin', code: ADMIN_CODE };
            } else {
                const userEntry = Object.entries(state.userData).find(([id, u]) => u.code === code);
                if (userEntry) {
                    state.currentUser = { ...userEntry[1], id: userEntry[0], role: 'user' };
                } else {
                    alert("Unauthorized Login Code"); return;
                }
            }
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            renderApp();
        }

        function renderApp() {
            const user = state.currentUser;
            document.getElementById('user-welcome').innerText = `${user.firstName} ${user.lastName}`;
            document.getElementById('user-role-tag').innerText = user.role === 'admin' ? 'Administrator' : 'Participant';
            
            if (user.role === 'admin') {
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdminUsers();
            }

            const container = document.getElementById('match-list');
            const now = new Date();
            const picks = (user.role === 'admin') ? {} : (state.userData[user.id]?.picks || {});

            container.innerHTML = state.matches.slice(1).map(m => {
                const kickoff = new Date(m.t);
                const isLocked = now > kickoff;
                const userPick = picks[m.id];
                
                return `
                    <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 ${isLocked ? 'locked' : ''}">
                        <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase mb-4">
                            <span>Match #${m.id}</span>
                            <span class="text-yellow-600">${kickoff.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})} ET</span>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="savePick(${m.id}, 'A')" class="flex justify-between p-3 rounded-xl border text-sm font-bold transition-all ${userPick === 'A' ? 'bg-yellow-500 border-yellow-400 text-black' : 'bg-slate-950 border-slate-800 hover:border-slate-600'}">
                                ${m.a} <span>${m.res === 'A' ? '⭐' : ''}</span>
                            </button>
                            ${m.type === 'Group' ? `
                                <button onclick="savePick(${m.id}, 'Tie')" class="p-1 rounded-lg border text-[10px] font-bold ${userPick === 'Tie' ? 'bg-slate-700 border-slate-500' : 'bg-slate-950 border-slate-900'}">DRAW</button>
                            ` : ''}
                            <button onclick="savePick(${m.id}, 'B')" class="flex justify-between p-3 rounded-xl border text-sm font-bold transition-all ${userPick === 'B' ? 'bg-yellow-500 border-yellow-400 text-black' : 'bg-slate-950 border-slate-800 hover:border-slate-600'}">
                                ${m.b} <span>${m.res === 'B' ? '⭐' : ''}</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function savePick(matchId, pick) {
            if (state.currentUser.role === 'admin') return;
            await db.ref(`users/${state.currentUser.id}/picks/${matchId}`).set(pick);
        }

        // --- ADMIN CONTROLS ---

        async function adminAddUser() {
            const first = document.getElementById('new-first').value.trim();
            const last = document.getElementById('new-last').value.trim();
            const code = document.getElementById('new-code').value.trim().toUpperCase();
            if(!first || !last || !code) return alert("All fields required");
            
            await db.ref('users').push({ firstName: first, lastName: last, code: code, picks: {} });
            document.getElementById('new-first').value = '';
            document.getElementById('new-last').value = '';
            document.getElementById('new-code').value = '';
        }

        async function adminDeleteUser(id) {
            if(confirm("Permanently delete this participant?")) {
                await db.ref(`users/${id}`).remove();
            }
        }

        function renderAdminUsers() {
            const container = document.getElementById('admin-user-list');
            container.innerHTML = Object.entries(state.userData).map(([id, u]) => `
                <div class="flex justify-between items-center p-3 bg-slate-950 rounded-xl border border-slate-800">
                    <div>
                        <p class="text-xs font-bold text-slate-200">${u.firstName} ${u.lastName}</p>
                        <p class="text-[10px] font-mono text-yellow-500 tracking-tighter">CODE: ${u.code}</p>
                    </div>
                    <button onclick="adminDeleteUser('${id}')" class="text-red-500 hover:text-red-400 text-xs p-2">✕</button>
                </div>
            `).join('');
        }

        async function adminSetResult() {
            const id = document.getElementById('res-match-id').value;
            const winner = document.getElementById('res-winner').value;
            if(!id || !winner) return alert("Match ID and Winner required");
            await db.ref(`matches/${id}/res`).set(winner);
        }

        function logout() {
            state.currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('app-content').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
